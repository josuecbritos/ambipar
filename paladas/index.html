<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Paladas — Ambipar</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00873D;
    --green-dark: #006830;
    --green-light: #e8f5ee;
    --green-mid: #b8dfc8;
    --white: #ffffff;
    --gray-50: #f4f5f4;
    --gray-100: #eaecea;
    --gray-300: #c8cdc8;
    --gray-500: #7a877a;
    --gray-800: #1e271e;
    --red: #c0392b;
    --red-light: #fdf0ee;
    --shadow: 0 4px 24px rgba(0,87,40,0.13);
    --radius: 16px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    height: 100dvh;
  }

  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--gray-50);
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  /* TOP BAR */
  .topbar {
    width: 100%;
    background: #BDFE00;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .topbar-logo {
    height: 28px;
    width: auto;
    display: block;
  }

  .topbar-sep {
    width: 1px;
    height: 20px;
    background: rgba(0,0,0,0.25);
  }

  .topbar-title {
    font-size: 11px;
    font-weight: 700;
    color: #1e271e;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    line-height: 1.3;
  }

  /* CARD — fills remaining height */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    width: calc(100% - 32px);
    max-width: 420px;
    margin: 16px 0;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 0;
    flex: 1;
    overflow: hidden;
  }

  /* Each section gets flex share */
  .section-operator  { flex: 0 0 auto; margin-bottom: 12px; }
  .counter-section   { flex: 0 0 auto; margin-bottom: 12px; }
  .section-button    { flex: 1 1 auto; display: flex; align-items: center; margin-bottom: 12px; }
  .history-section   { flex: 0 0 auto; }
  .status-wrap       { flex: 0 0 auto; margin-top: 8px; }

  /* LABEL */
  .label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gray-500);
    margin-bottom: 5px;
  }

  /* SELECT */
  .select-wrapper { position: relative; }

  select {
    width: 100%;
    appearance: none;
    background: var(--gray-50);
    border: 1.5px solid var(--gray-300);
    border-radius: var(--radius-sm);
    padding: 10px 40px 10px 14px;
    font-family: 'Montserrat', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--gray-800);
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }

  select:focus { border-color: var(--green); }

  .select-arrow {
    position: absolute;
    right: 13px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: var(--green);
  }

  /* COUNTER */
  .counter-section {
    text-align: center;
    padding: 10px 0;
    border-top: 1px solid var(--gray-100);
    border-bottom: 1px solid var(--gray-100);
  }

  .counter-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gray-500);
    margin-bottom: 2px;
  }

  .counter-number {
    font-family: 'Roboto Mono', monospace;
    font-size: clamp(56px, 12vh, 88px);
    font-weight: 500;
    color: var(--green);
    line-height: 1;
    transition: transform 0.15s cubic-bezier(.34,1.56,.64,1);
  }

  .counter-number.bump { transform: scale(1.1); }

  /* BUTTON — expands to fill space */
  .btn-register {
    background: var(--green-light);
    border: 2px solid var(--green-mid);
    border-radius: var(--radius);
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s, border-color 0.15s;
    user-select: none;
    outline: none;
  }

  .btn-register:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-register:not(:disabled):active { transform: scale(0.97); background: var(--green-mid); }
  .btn-register.success { background: var(--green); border-color: var(--green-dark); }

  .btn-icon {
    width: clamp(44px, 7vh, 56px);
    height: clamp(44px, 7vh, 56px);
    background: var(--green);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    box-shadow: 0 4px 12px rgba(0,135,61,0.30);
  }

  .btn-register.success .btn-icon { background: rgba(255,255,255,0.2); box-shadow: none; }

  .btn-text {
    font-size: 14px;
    font-weight: 700;
    color: var(--green);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: color 0.15s;
  }

  .btn-register.success .btn-text { color: var(--white); }

  /* HISTORY */
  .history-section { display: flex; flex-direction: column; gap: 6px; }
  .history-list { display: flex; flex-direction: column; gap: 5px; }

  .history-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--gray-50);
    border-radius: var(--radius-sm);
    border-left: 3px solid var(--green);
    padding: 7px 8px 7px 10px;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .history-info { display: flex; flex-direction: column; gap: 1px; flex: 1; }

  .history-time {
    font-family: 'Roboto Mono', monospace;
    font-size: 12px;
    color: var(--gray-800);
    font-weight: 500;
  }

  .history-op {
    font-size: 10px;
    font-weight: 600;
    color: var(--green);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .btn-delete {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--gray-300);
    padding: 5px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    transition: color 0.15s, background 0.15s;
    margin-left: 6px;
  }

  .btn-delete:active { color: var(--red); background: var(--red-light); }

  .empty-state {
    text-align: center;
    color: var(--gray-500);
    font-size: 11px;
    font-weight: 600;
    padding: 8px 0;
    letter-spacing: 0.03em;
  }

  /* STATUS */
  .status-bar {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--gray-500);
    min-height: 14px;
    letter-spacing: 0.03em;
  }

  .status-bar.error { color: var(--red); }
  .status-bar.ok    { color: var(--green); }

  .spinner {
    display: inline-block;
    width: 10px;
    height: 10px;
    border: 2px solid var(--gray-300);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 4px;
  }

  /* SKELETON */
  .skeleton {
    background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-50) 50%, var(--gray-100) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 6px;
  }

  .skeleton-counter {
    width: 80px;
    height: 72px;
    margin: 4px auto;
    border-radius: 8px;
  }

  .skeleton-item {
    height: 44px;
    border-radius: var(--radius-sm);
    margin-bottom: 5px;
  }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <img class="topbar-logo" src="https://raw.githubusercontent.com/josuecbritos/ambipar/main/paladas/ambipar-logo.png" alt="Ambipar">
  <div class="topbar-sep"></div>
  <div class="topbar-title">Registro de Paladas<br>Clasificación Giri</div>
</div>

<div class="card">

  <!-- OPERADOR -->
  <div class="section-operator">
    <div class="label">Operador Actual</div>
    <div class="select-wrapper">
      <select id="operador" onchange="onOperadorChange()">
        <option value="">— Seleccione su nombre —</option>
        <option value="Gonzalo">Gonzalo</option>
        <option value="Axel">Axel</option>
        <option value="Josué">Josué</option>
      </select>
      <div class="select-arrow">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- CONTADOR -->
  <div class="counter-section">
    <div class="counter-label">Paladas Totales Hoy</div>
    <div class="counter-number" id="counter"><div class="skeleton skeleton-counter"></div></div>
  </div>

  <!-- BOTÓN -->
  <div class="section-button">
    <button class="btn-register" id="btnRegistrar" onclick="registrarPalada()" disabled>
      <div class="btn-icon">
        <svg width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
        </svg>
      </div>
      <div class="btn-text">Registrar Palada</div>
    </button>
  </div>

  <!-- HISTORIAL -->
  <div class="history-section">
    <div class="label">Últimos registros del día</div>
    <div class="history-list" id="historyList">
      <div class="skeleton skeleton-item"></div>
      <div class="skeleton skeleton-item"></div>
      <div class="skeleton skeleton-item"></div>
    </div>
  </div>

  <!-- STATUS -->
  <div class="status-wrap">
    <div class="status-bar" id="statusBar"></div>
  </div>

</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycby-R28J6WHvMln9BDGXViTngt5nqmnxbzB1PVGq5uyxbN7riMkT7Ob5jh-kUX15m4s/exec";
  const TOKEN   = "paladas2026";

  let todosLosRegistros = [];
  let operadorActual = sessionStorage.getItem("operador") || "";

  // ── INIT ──────────────────────────────────────────
  window.addEventListener("DOMContentLoaded", () => {
    if (operadorActual) {
      document.getElementById("operador").value = operadorActual;
      document.getElementById("btnRegistrar").disabled = false;
    }
    // No llamar actualizarUI() aquí — el skeleton ya está en el HTML
    cargarDatos();
  });

  // ── OPERADOR ──────────────────────────────────────
  function onOperadorChange() {
    operadorActual = document.getElementById("operador").value;
    sessionStorage.setItem("operador", operadorActual);
    document.getElementById("btnRegistrar").disabled = !operadorActual;
  }

  // ── API ───────────────────────────────────────────
  async function cargarDatos() {
    try {
      const res = await fetch(`${API_URL}?token=${TOKEN}`, { redirect: "follow" });
      todosLosRegistros = await res.json();
      actualizarUI();
    } catch (err) {
      setStatus("Error al cargar datos", "error");
    }
  }

  async function registrarPalada() {
    if (!operadorActual) return;
    const btn = document.getElementById("btnRegistrar");
    btn.disabled = true;

    const registro = {
      id: crypto.randomUUID(),
      timestamp: new Date().toISOString(),
      operador: operadorActual
    };

    // Actualizar UI de inmediato (optimista)
    todosLosRegistros.push(registro);
    actualizarUI();
    animarBoton();
    animarContador();

    try {
      await fetch(`${API_URL}?token=${TOKEN}`, {
        method: "POST",
        redirect: "follow",
        body: JSON.stringify(registro)
      });
      setStatus("✓ Guardado", "ok");
      setTimeout(() => setStatus("", ""), 2000);
    } catch (err) {
      // Revertir si falló
      todosLosRegistros = todosLosRegistros.filter(r => r.id !== registro.id);
      actualizarUI();
      setStatus("Error al guardar", "error");
    } finally {
      btn.disabled = false;
    }
  }

  async function eliminarRegistro(id) {
    // Actualizar UI de inmediato (optimista)
    todosLosRegistros = todosLosRegistros.filter(r => r.id !== id);
    actualizarUI();

    try {
      await fetch(`${API_URL}?token=${TOKEN}`, {
        method: "POST",
        redirect: "follow",
        body: JSON.stringify({ _delete: true, id })
      });
    } catch (err) {
      setStatus("Error al eliminar", "error");
      cargarDatos(); // Recargar estado real si falló
    }
  }

  // ── UI ────────────────────────────────────────────
  function esHoy(ts) {
    return new Date(ts).toDateString() === new Date().toDateString();
  }

  function formatearFechaHora(ts) {
    const d = new Date(ts);
    const dia = String(d.getDate()).padStart(2, "0");
    const mes = String(d.getMonth() + 1).padStart(2, "0");
    const anio = d.getFullYear();
    const hh = String(d.getHours()).padStart(2, "0");
    const mm = String(d.getMinutes()).padStart(2, "0");
    const ss = String(d.getSeconds()).padStart(2, "0");
    return `${dia}/${mes}/${anio} · ${hh}:${mm}:${ss}`;
  }

  function actualizarUI() {
    const hoy = todosLosRegistros.filter(r => esHoy(r.timestamp));

    // Contador: total del día, todos los operadores
    document.getElementById("counter").textContent = hoy.length;

    // Historial: últimos 5 del día, todos los operadores
    const ultimos5 = hoy.slice(-5).reverse();
    const lista = document.getElementById("historyList");

    if (ultimos5.length === 0) {
      lista.innerHTML = '<div class="empty-state">Sin registros hoy</div>';
      return;
    }

    lista.innerHTML = ultimos5.map(r => `
      <div class="history-item">
        <div class="history-info">
          <span class="history-time">${formatearFechaHora(r.timestamp)}</span>
          <span class="history-op">${r.operador}</span>
        </div>
        <button class="btn-delete" onclick="eliminarRegistro('${r.id}')" title="Eliminar">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>`).join("");
  }

  function animarBoton() {
    const btn = document.getElementById("btnRegistrar");
    btn.classList.add("success");
    setTimeout(() => btn.classList.remove("success"), 700);
  }

  function animarContador() {
    const c = document.getElementById("counter");
    c.classList.add("bump");
    setTimeout(() => c.classList.remove("bump"), 200);
  }

  function setStatus(msg, tipo) {
    const bar = document.getElementById("statusBar");
    bar.innerHTML = msg;
    bar.className = "status-bar" + (tipo ? ` ${tipo}` : "");
  }
</script>

</body>
</html>
